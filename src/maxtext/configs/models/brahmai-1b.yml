# Model config for BrahmAI 1B (Edge Deployment)

base_num_decoder_layers: 36
base_emb_dim: 1280

base_num_query_heads: 10
base_num_kv_heads: 5
base_mlp_dim: 6144
mlp_activations: ["silu", "linear"] # SwiGLU configuration
head_dim: 128
# global_head_dim omitted to enforce uniform 128 across all layers
vocab_size: 65536
decoder_block: "gemma4"
normalization_layer_epsilon: 1e-6
logits_via_embedding: true
use_post_attn_norm: true
use_post_ffw_norm: true

# Attention & Windowing
sliding_window_size: 1024
share_kv_projections: true # K=V unified at global layers
v_norm_with_scale: false

# RoPE scaling (Assuming default timescales based on your gemma4.py)
local_rope_max_timescale: 10000
global_rope_max_timescale: 1000000
rope_max_timescale: 1000000
global_rope_proportion: 0.25
local_rope_proportion: 1.0
final_logits_soft_cap: 30.0
